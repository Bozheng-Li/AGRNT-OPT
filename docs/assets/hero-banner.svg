<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-label="Agent-OPT hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="45%" stop-color="#13233f"/>
      <stop offset="100%" stop-color="#1b3a5f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="1080" cy="70" r="120" fill="#38bdf8" opacity="0.12" filter="url(#soft)"/>
  <circle cx="180" cy="360" r="140" fill="#a78bfa" opacity="0.14" filter="url(#soft)"/>
  <rect x="0" y="196" width="1280" height="2" fill="url(#glow)"/>

  <!-- Brand mark -->
  <g transform="translate(72,78)">
    <rect width="72" height="72" rx="18" fill="url(#accent)"/>
    <path d="M18 46 L36 20 L54 46 Z" fill="#0b1220" opacity="0.9"/>
    <rect x="24" y="40" width="24" height="8" rx="3" fill="#e0f2fe"/>
    <circle cx="36" cy="30" r="4" fill="#e0f2fe"/>
  </g>

  <text x="168" y="118" fill="#f8fafc" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="46" font-weight="700">Agent-OPT</text>
  <text x="168" y="156" fill="#93c5fd" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22">Quality-first MCP · Skills · Plugins · Web Adaptation</text>
  <text x="168" y="192" fill="#cbd5e1" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18">把真正有用的 Agent 能力，做成真正好用的 Web 工作台</text>

  <!-- Metric chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <g transform="translate(168,230)">
      <rect width="150" height="68" rx="14" fill="url(#card)" stroke="#334155"/>
      <text x="75" y="30" text-anchor="middle" fill="#38bdf8" font-size="24" font-weight="700">41</text>
      <text x="75" y="52" text-anchor="middle" fill="#94a3b8" font-size="13">Public Web</text>
    </g>
    <g transform="translate(338,230)">
      <rect width="170" height="68" rx="14" fill="url(#card)" stroke="#334155"/>
      <text x="85" y="30" text-anchor="middle" fill="#a78bfa" font-size="24" font-weight="700">13+28</text>
      <text x="85" y="52" text-anchor="middle" fill="#94a3b8" font-size="13">MCP + Skills</text>
    </g>
    <g transform="translate(528,230)">
      <rect width="170" height="68" rx="14" fill="url(#card)" stroke="#334155"/>
      <text x="85" y="30" text-anchor="middle" fill="#34d399" font-size="24" font-weight="700">16.7k+</text>
      <text x="85" y="52" text-anchor="middle" fill="#94a3b8" font-size="13">Discovered MCP</text>
    </g>
    <g transform="translate(718,230)">
      <rect width="170" height="68" rx="14" fill="url(#card)" stroke="#334155"/>
      <text x="85" y="30" text-anchor="middle" fill="#fbbf24" font-size="24" font-weight="700">QA Gates</text>
      <text x="85" y="52" text-anchor="middle" fill="#94a3b8" font-size="13">Not Just Listings</text>
    </g>
  </g>

  <!-- Right feature cards -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <g transform="translate(930,88)">
      <rect width="280" height="78" rx="16" fill="url(#card)" stroke="#334155"/>
      <circle cx="34" cy="39" r="14" fill="#22d3ee22" stroke="#22d3ee"/>
      <text x="28" y="44" fill="#22d3ee" font-size="14">1</text>
      <text x="62" y="36" fill="#f1f5f9" font-size="16" font-weight="600">Discover</text>
      <text x="62" y="56" fill="#94a3b8" font-size="13">Registry · Markets · Repos</text>
    </g>
    <g transform="translate(930,180)">
      <rect width="280" height="78" rx="16" fill="url(#card)" stroke="#334155"/>
      <circle cx="34" cy="39" r="14" fill="#a78bfa22" stroke="#a78bfa"/>
      <text x="28" y="44" fill="#a78bfa" font-size="14">2</text>
      <text x="62" y="36" fill="#f1f5f9" font-size="16" font-weight="600">Adapt + Localize</text>
      <text x="62" y="56" fill="#94a3b8" font-size="13">ZH/EN · Sandbox · Runtime</text>
    </g>
    <g transform="translate(930,272)">
      <rect width="280" height="78" rx="16" fill="url(#card)" stroke="#334155"/>
      <circle cx="34" cy="39" r="14" fill="#34d39922" stroke="#34d399"/>
      <text x="28" y="44" fill="#34d399" font-size="14">3</text>
      <text x="62" y="36" fill="#f1f5f9" font-size="16" font-weight="600">Verify on Web</text>
      <text x="62" y="56" fill="#94a3b8" font-size="13">Core · Scenario · E2E Tests</text>
    </g>
  </g>

  <text x="72" y="380" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14">Only web-ready / verified entries appear in the public catalog · Quality over quantity</text>
</svg>
